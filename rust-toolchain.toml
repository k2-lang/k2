# Pin the k2 toolchain to a fixed stable release.
#
# The k2 compiler uses no nightly or unstable features. We pin an exact version
# (rather than a floating `stable`) so that rustc/clippy/rustfmt are identical
# in CI and in development — otherwise newer-stable clippy lints drift from the
# local toolchain and fail CI on style-only changes. The project is developed
# on 1.93.x.

[toolchain]
channel = "1.93.0"
components = ["rustfmt", "clippy"]
profile = "minimal"
